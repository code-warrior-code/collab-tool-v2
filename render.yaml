services:
  - type: web
    name: collab-tool-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: http://localhost:5173
      - key: JWT_SECRET
        generateValue: true
    databases:
      - name: collab-tool-db
        plan: free
